<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/admin_dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <header
        style="display: flex; justify-content: center; align-items: center; background-color: #b1daea; padding: 10px 20px;">

        <!-- Left: Welcome message -->
        <div style="position: absolute; left: 20px;">Welcome to Admin</div>

        <!-- Centre: Nav Links -->
        <nav style="text-align: center;">
            <ul style="list-style: none; padding: 0; margin: 0;">
                <li style="display: inline; margin: 0 12px;">
                    <a href="{{ url_for('main_routes.admin_home') }}">Home</a>
                </li>
                <li style="display: inline; margin: 0 12px;">
                    <a href="{{ url_for('main_routes.admin_users') }}">Users</a>
                </li>
                <li style="display: inline; margin: 0 12px;">
                    <a href="{{ url_for('main_routes.admin_search') }}">Search</a>
                </li>
                <li style="display: inline; margin: 0 12px;">
                    <a href="{{ url_for('main_routes.admin_summary') }}">Summary</a>
                </li>
                <li style="display: inline; margin: 0 12px;">
                    <a href="{{ url_for('main_routes.admin_logout') }}">Log Out</a>
                </li>
            </ul>
        </nav>

    </header>


    <main>
        {% block content %}{% endblock %}
    </main>

</body>

</html>
